services:
  postgres:
    image: postgres:16-alpine
    container_name: pim_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pim_user
      POSTGRES_PASSWORD: pim_password
      POSTGRES_DB: pim_db
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pim_user -d pim_db']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pim_redis
    restart: unless-stopped
    command: redis-server --requirepass pim_redis_password
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '--no-auth-warning', '-a', 'pim_redis_password', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: pim_api
    restart: unless-stopped
    ports:
      - '4003:4000'
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://pim_user:pim_password@postgres:5432/pim_db?schema=public
      REDIS_URL: redis://:pim_redis_password@redis:6379
      JWT_SECRET: dev-jwt-secret-change-in-production-min-32-chars
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-production-min-32
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:4004
      LOG_LEVEL: info
      UPLOAD_DIR: /data/uploads
    volumes:
      - api_uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'node -e "require(\"http\").get(\"http://localhost:4000/api/v1/health\", r => process.exit(r.statusCode === 200 ? 0 : 1)).on(\"error\", () => process.exit(1))"']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: pim_web
    restart: unless-stopped
    ports:
      - '4004:80'
    depends_on:
      api:
        condition: service_healthy

  adminer:
    image: adminer:latest
    container_name: pim_adminer
    restart: unless-stopped
    ports:
      - '4005:8080'
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
  api_uploads:
